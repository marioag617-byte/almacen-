<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0f1e">
<title>Asistente Almacén</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0f1e;--bg2:#111827;--bg3:#1a2235;--bg4:#1f2d45;
  --border:#2a3a55;--border2:#3a4f70;
  --text:#e8f0fe;--muted:#7a90b0;--hint:#4a6080;
  --accent:#4f9cf9;--accent2:#38bdf8;--green:#34d399;
  --orange:#fb923c;--red:#f87171;--yellow:#fbbf24;--purple:#a78bfa;
  --radius:12px;--radius-sm:8px;--radius-lg:18px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;-webkit-font-smoothing:antialiased;overflow:hidden}
.shell{display:flex;height:100dvh;overflow:hidden}
.sidebar{width:64px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:6px;flex-shrink:0;z-index:10}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.nav-ico{width:44px;height:44px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;border:1.5px solid transparent;transition:all .2s;color:var(--muted)}
.nav-ico:hover{background:var(--bg3);color:var(--text)}
.nav-ico.active{background:var(--bg4);border-color:var(--border2);color:var(--accent)}
.nav-ico.logo{font-size:22px;color:var(--accent);margin-bottom:8px;cursor:default;border:none}
.nav-sep{width:32px;height:1px;background:var(--border);margin:4px 0}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:600;letter-spacing:-.2px}
.topbar-sub{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px}
.hora-badge{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:11px;font-family:'DM Mono',monospace;color:var(--accent2)}
.page{display:none;flex:1;overflow-y:auto;padding:16px 20px 80px}
.page.active{display:block}
.chat-page{display:none;flex:1;flex-direction:column;overflow:hidden}
.chat-page.active{display:flex}
.chat-msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.msg{display:flex;gap:10px;align-items:flex-start;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px}
.msg.ai .msg-avatar{background:linear-gradient(135deg,#1e40af,#4f9cf9);color:#fff}
.msg.user .msg-avatar{background:var(--bg4);border:1px solid var(--border2)}
.msg-bubble{max-width:80%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg) var(--radius-lg) var(--radius-lg) 4px;padding:10px 14px;font-size:14px;line-height:1.6}
.msg.user .msg-bubble{background:var(--bg4);border-color:var(--border2);border-radius:var(--radius-lg) var(--radius-lg) 4px var(--radius-lg)}
.typing-dots span{display:inline-block;animation:dot 1.2s infinite;opacity:0;font-size:18px}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{opacity:0}40%{opacity:1}}

/* Cards de acción en el chat */
.accion-card{background:var(--bg4);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 12px;margin-top:8px}
.accion-card-titulo{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.accion-card-body{font-size:13px;color:var(--text);margin-bottom:8px;line-height:1.5}
.accion-card-btns{display:flex;gap:6px;flex-wrap:wrap}
.btn-accion{border:none;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.btn-accion:active{opacity:.8}
.btn-confirmar{background:var(--accent);color:#fff}
.btn-confirmar.green{background:var(--green);color:#0a0f1e}
.btn-confirmar.orange{background:var(--orange);color:#0a0f1e}
.btn-cancelar{background:var(--bg3);color:var(--muted);border:1px solid var(--border)}

/* Notificación recordatorio */
.notif-banner{position:fixed;top:0;left:0;right:0;background:linear-gradient(90deg,#1e40af,#4f9cf9);padding:10px 16px;display:flex;align-items:center;gap:10px;z-index:500;transform:translateY(-100%);transition:transform .4s ease;font-size:13px}
.notif-banner.show{transform:translateY(0)}
.notif-close{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;margin-left:auto}

.chat-input-wrap{padding:10px 14px;border-top:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;gap:8px}
.chat-input-row{display:flex;gap:8px;align-items:flex-end}
.chat-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 14px;outline:none;resize:none;min-height:44px;max-height:200px;line-height:1.5;transition:border-color .2s}
.chat-input:focus{border-color:var(--accent);min-height:80px}
.chat-input::placeholder{color:var(--muted)}
.chat-btns{display:flex;gap:6px;align-items:flex-end}
.mic-btn{width:44px;height:44px;border-radius:50%;background:var(--bg3);border:1.5px solid var(--border);color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all .2s;flex-shrink:0}
.mic-btn:hover{border-color:var(--accent);color:var(--accent)}
.mic-btn.grabando{background:#450a0a;border-color:var(--red);color:var(--red);animation:pulseRed 1s infinite}
@keyframes pulseRed{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.4)}50%{box-shadow:0 0 0 8px rgba(248,113,113,0)}}
.voz-indicator{display:none;align-items:center;gap:8px;padding:6px 12px;background:#450a0a;border:1px solid var(--red);border-radius:var(--radius-sm);font-size:12px;color:var(--red)}
.voz-indicator.show{display:flex}
.voz-waves{display:flex;gap:3px;align-items:center}
.voz-wave{width:3px;background:var(--red);border-radius:2px;animation:wave .6s infinite alternate}
.voz-wave:nth-child(1){height:8px}.voz-wave:nth-child(2){height:16px;animation-delay:.1s}.voz-wave:nth-child(3){height:10px;animation-delay:.2s}.voz-wave:nth-child(4){height:20px;animation-delay:.3s}.voz-wave:nth-child(5){height:8px;animation-delay:.4s}
@keyframes wave{from{transform:scaleY(1)}to{transform:scaleY(.3)}}
.send-btn{width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0;transition:opacity .15s,transform .15s}
.send-btn:active{opacity:.8;transform:scale(.95)}
.send-btn:disabled{opacity:.4;cursor:not-allowed}

/* Dashboard */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.card-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.metric{background:var(--bg3);border-radius:var(--radius-sm);padding:12px 10px;text-align:center}
.metric-num{font-size:26px;font-weight:700;font-family:'Syne',sans-serif;line-height:1}
.metric-lbl{font-size:9px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.04em}
.metric-num.accent{color:var(--accent)}.metric-num.green{color:var(--green)}.metric-num.orange{color:var(--orange)}.metric-num.red{color:var(--red)}
.section-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.task-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.task-check{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.task-check.done{background:var(--green);border-color:var(--green);color:#fff;font-size:11px}
.task-body{flex:1;min-width:0}
.task-name{font-size:14px;font-weight:500}
.task-name.done{text-decoration:line-through;color:var(--muted)}
.task-meta{font-size:11px;color:var(--muted);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
.prio{padding:1px 7px;border-radius:20px;font-size:10px;font-weight:600}
.prio.alta{background:#450a0a;color:var(--red)}.prio.media{background:#422006;color:var(--orange)}.prio.baja{background:#052e16;color:var(--green)}
.task-del{background:none;border:none;color:var(--hint);cursor:pointer;font-size:16px;padding:2px 6px;border-radius:4px}
.task-del:hover{color:var(--red)}
.recep-item{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:8px}
.recep-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.recep-nombre{font-size:14px;font-weight:500}
.recep-meta{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;display:flex;gap:10px;flex-wrap:wrap}
.status-badge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.status-badge.pendiente{background:#422006;color:var(--orange)}.status-badge.recibido{background:#052e16;color:var(--green)}.status-badge.revision{background:#1e1a4a;color:var(--purple)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.field{margin-bottom:12px}
.field label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:9px 12px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field select option{background:var(--bg2)}
.btn{padding:9px 18px;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:opacity .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}
.btn-ghost{background:var(--bg3);color:var(--muted);border:1px solid var(--border)}
.report-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.report-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.report-icon{width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.report-title{font-size:14px;font-weight:600}
.report-sub{font-size:11px;color:var(--muted)}
.bar-wrap{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden;margin-top:8px}
.bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--bg4);border:1px solid var(--border2);color:var(--text);padding:9px 18px;border-radius:30px;font-size:13px;z-index:999;transition:transform .3s,opacity .3s;white-space:nowrap;pointer-events:none;opacity:0}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);padding:8px 0 env(safe-area-inset-bottom,8px);z-index:100}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:9px;cursor:pointer;padding:4px 0;transition:color .15s}
.bnav-btn.active{color:var(--accent)}
.bnav-icon{font-size:20px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;align-items:flex-end}
.overlay.open{display:flex}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:20px 20px 36px;width:100%;max-height:90dvh;overflow-y:auto;animation:slideUp .25s ease;position:relative}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.panel-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:600;margin-bottom:16px}
.panel-close{position:absolute;right:18px;top:18px;background:var(--bg3);border:none;color:var(--muted);width:28px;height:28px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
@media(max-width:600px){.sidebar{display:none}.bottom-nav{display:flex!important}.grid-4{grid-template-columns:repeat(2,1fr)}.form-row{grid-template-columns:1fr}}
@media(min-width:601px){.overlay{align-items:center}.panel{max-width:480px;margin:0 auto;border-radius:var(--radius-lg)}}
</style>
</head>
<body>

<!-- Notificación recordatorio -->
<div class="notif-banner" id="notif-banner">
  <span style="font-size:18px">🔔</span>
  <span id="notif-texto">Recordatorio</span>
  <button class="notif-close" onclick="cerrarNotif()">×</button>
</div>

<div class="shell">
  <nav class="sidebar">
    <div class="nav-ico logo">📦</div>
    <div class="nav-sep"></div>
    <div class="nav-ico active" onclick="irA('dashboard',this)">🏠</div>
    <div class="nav-ico" onclick="irA('chat',this)">🤖</div>
    <div class="nav-ico" onclick="irA('tareas',this)">✅</div>
    <div class="nav-ico" onclick="irA('recepciones',this)">🚚</div>
    <div class="nav-ico" onclick="irA('reporte',this)">📊</div>
  </nav>

  <div class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title" id="page-title">Dashboard</div>
        <div class="topbar-sub" id="page-sub">Resumen del día</div>
      </div>
      <div class="hora-badge" id="reloj">--:--</div>
    </div>

    <!-- DASHBOARD -->
    <div class="page active" id="pg-dashboard">
      <div class="grid-4">
        <div class="metric"><div class="metric-num accent" id="d-tareas">0</div><div class="metric-lbl">Tareas hoy</div></div>
        <div class="metric"><div class="metric-num green" id="d-hechas">0</div><div class="metric-lbl">Completadas</div></div>
        <div class="metric"><div class="metric-num orange" id="d-recep">0</div><div class="metric-lbl">Recepciones</div></div>
        <div class="metric"><div class="metric-num red" id="d-pend">0</div><div class="metric-lbl">Pendientes</div></div>
      </div>
      <div class="card" style="margin-bottom:14px"><div class="card-title">Tareas pendientes</div><div id="d-lista-tareas"></div></div>
      <div class="card" style="margin-bottom:14px"><div class="card-title">Últimas recepciones</div><div id="d-lista-recep"></div></div>
      <div class="card"><div class="card-title">Recordatorios activos</div><div id="d-recordatorios-lista"></div></div>
    </div>

    <!-- CHAT -->
    <div class="chat-page" id="pg-chat">
      <div class="chat-msgs" id="chat-msgs"></div>
      <div class="chat-input-wrap">
        <div class="voz-indicator" id="voz-indicator">
          <div class="voz-waves"><div class="voz-wave"></div><div class="voz-wave"></div><div class="voz-wave"></div><div class="voz-wave"></div><div class="voz-wave"></div></div>
          <span>Escuchando...</span>
        </div>
        <div class="chat-input-row">
          <textarea class="chat-input" id="chat-input"
            placeholder="Ej: 'Agrega leche Gloria lote L-01 vence el 15/05/2026' o 'Recuérdame revisar el inventario a las 3pm'"
            onkeydown="chatKeydown(event)" oninput="autoResize(this)"></textarea>
          <div class="chat-btns">
            <button class="mic-btn" id="mic-btn" onclick="toggleVoz()">🎤</button>
            <button class="send-btn" id="send-btn" onclick="enviarMensaje()">➤</button>
          </div>
        </div>
      </div>
    </div>

    <!-- TAREAS -->
    <div class="page" id="pg-tareas">
      <div class="section-title">Tareas del día <button class="btn btn-primary" onclick="abrirPanel('tarea')" style="font-size:12px;padding:6px 12px">+ Nueva</button></div>
      <div id="lista-tareas"></div>
    </div>

    <!-- RECEPCIONES -->
    <div class="page" id="pg-recepciones">
      <div class="section-title">Recepciones <button class="btn btn-primary" onclick="abrirPanel('recepcion')" style="font-size:12px;padding:6px 12px">+ Registrar</button></div>
      <div id="lista-recepciones"></div>
    </div>

    <!-- REPORTE -->
    <div class="page" id="pg-reporte">
      <div class="section-title">Reporte del día</div>
      <div id="contenido-reporte"></div>
    </div>
  </div>
</div>

<nav class="bottom-nav" style="display:none">
  <button class="bnav-btn active" onclick="irA('dashboard',this)"><span class="bnav-icon">🏠</span>Inicio</button>
  <button class="bnav-btn" onclick="irA('chat',this)"><span class="bnav-icon">🤖</span>IA</button>
  <button class="bnav-btn" onclick="irA('tareas',this)"><span class="bnav-icon">✅</span>Tareas</button>
  <button class="bnav-btn" onclick="irA('recepciones',this)"><span class="bnav-icon">🚚</span>Recep.</button>
  <button class="bnav-btn" onclick="irA('reporte',this)"><span class="bnav-icon">📊</span>Reporte</button>
</nav>

<!-- PANEL TAREA -->
<div class="overlay" id="overlay-tarea" onclick="cerrarPanel('tarea',event)">
  <div class="panel">
    <button class="panel-close" onclick="cerrarPanel('tarea')">×</button>
    <div class="panel-title">Nueva tarea</div>
    <div class="field"><label>Nombre</label><input type="text" id="t-nombre" placeholder="Ej: Revisar vencimientos"></div>
    <div class="form-row">
      <div class="field"><label>Hora</label><input type="time" id="t-hora"></div>
      <div class="field"><label>Prioridad</label><select id="t-prio"><option value="alta">Alta</option><option value="media" selected>Media</option><option value="baja">Baja</option></select></div>
    </div>
    <div class="field"><label>Categoría</label><select id="t-cat"><option>Recepción de mercadería</option><option>Control de vencimientos</option><option>Inventario</option><option>Limpieza y orden</option><option>Reporte</option><option>Otro</option></select></div>
    <button class="btn btn-primary" onclick="agregarTarea()" style="width:100%;justify-content:center;padding:12px">Guardar tarea</button>
  </div>
</div>

<!-- PANEL RECEPCIÓN -->
<div class="overlay" id="overlay-recepcion" onclick="cerrarPanel('recepcion',event)">
  <div class="panel">
    <button class="panel-close" onclick="cerrarPanel('recepcion')">×</button>
    <div class="panel-title">Registrar recepción</div>
    <div class="field"><label>Proveedor / Producto</label><input type="text" id="r-nombre" placeholder="Ej: Distribuidora Norte"></div>
    <div class="form-row">
      <div class="field"><label>Cantidad bultos</label><input type="number" id="r-qty" placeholder="10" min="1"></div>
      <div class="field"><label>Estado</label><select id="r-estado"><option value="pendiente">Pendiente</option><option value="recibido">Recibido</option><option value="revision">En revisión</option></select></div>
    </div>
    <div class="field"><label>Observaciones</label><textarea id="r-obs" rows="2" placeholder="Notas adicionales"></textarea></div>
    <button class="btn btn-primary" onclick="agregarRecepcion()" style="width:100%;justify-content:center;padding:12px">Registrar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────
const API_SHEETS = 'https://script.google.com/macros/s/AKfycbzqD-Y1hxzyOcH1vak5mCwsBLtweLDF4cUpNiUY6l5yOsmisspwz_Qn3MAcduK3bh1FPw/exec';

// ── DATOS ─────────────────────────────────────────────────────
let tareas       = JSON.parse(localStorage.getItem('asis_tareas3') || 'null') || [];
let recepciones  = JSON.parse(localStorage.getItem('asis_recep3')  || '[]');
let recordatorios= JSON.parse(localStorage.getItem('asis_record')  || '[]');
let chatHistory  = [];
let nextIdT = Date.now(), nextIdR = Date.now()+1, nextIdRec = Date.now()+2;
let reconocimiento = null, grabando = false;

if (!tareas.length) {
  const hoy = new Date().toISOString().split('T')[0];
  tareas = [
    {id:1,nombre:'Revisar fechas de vencimiento',hora:'08:00',prio:'alta',cat:'Control de vencimientos',done:false,fecha:hoy},

function verificarRecordatorios(ahora){
  const horaActual = ahora.getHours()*60 + ahora.getMinutes();
  recordatorios.forEach(function(r){
    if(r.disparado) return;
    const [hh,mm] = r.hora.split(':').map(Number);

    if(Math.abs(horaActual - horaRec) <= 1){

      if('Notification' in window && Notification.permission==='granted'){

// ── JSONP para Sheets ─────────────────────────────────────────
function jsonp(params){
  return new Promise(function(resolve, reject){
    var cbName = 'cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    var timeout = setTimeout(function(){
      delete window[cbName];
      if(script.parentNode) script.parentNode.removeChild(script);
      reject(new Error('Timeout conexión Sheets'));
    }, 15000);
    window[cbName] = function(data){
      clearTimeout(timeout);
      delete window[cbName];
      if(script.parentNode) script.parentNode.removeChild(script);
      resolve(data);
    };
    params.callback = cbName;
    var qs = Object.keys(params).map(function(k){
      return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);
    }).join('&');
    var script = document.createElement('script');
    script.src = API_SHEETS+'?'+qs;
    script.onerror = function(){
      clearTimeout(timeout);
      delete window[cbName];
      reject(new Error('Error de red'));
    };
    document.head.appendChild(script);
  });
}

async function enviarASheets(producto){
  try {
    const resp = await jsonp({
      accion: 'agregar_vencimiento',
      nombre: producto.nombre,
      lote:   producto.lote   || '-',
      cat:    producto.cat    || 'Otro',
      fecha:  producto.fecha,
      qty:    producto.qty    || 0
    });
    return resp;
  } catch(e){
    return { ok: false, error: e.message };
  }
}

function initVoz(){

  if(!SR) return null;
  const r = new SR();
  r.lang='es-PE'; r.continuous=false; r.interimResults=false;
  r.onresult=function(e){

    document.getElementById('chat-input').value=texto;

    enviarMensaje();

// Respuesta local con detección básica
function respuestaLocal(texto){
  const t=texto.toLowerCase();
  const hoy=new Date().toISOString().split('T')[0];
  const tareasHoy=tareas.filter(t=>t.fecha===hoy);

  // Detectar vencimiento
  if((t.includes('vence')||t.includes('vencimiento')||t.includes('agrega')&&t.includes('fecha')) && !t.includes('tarea')){
    const horaMatch=texto.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    let fecha=hoy;
    if(horaMatch) fecha=horaMatch[3]+'-'+horaMatch[2].padStart(2,'0')+'-'+horaMatch[1].padStart(2,'0');
    const loteMatch=texto.match(/lote\s+([A-Z0-9\-]+)/i);
    const qtyMatch=texto.match(/(\d+)\s*(unidades|unid|cajas|bultos)/i);
    const nombre=texto.replace(/agrega(me)?|añade|vence.*|lote\s+\S+|\d+\s*(unid|unidades|cajas)/gi,'').trim()||'Producto nuevo';
    return {
      texto:'📦 Aquí está el producto que quieres agregar a Google Sheets. Confirma para guardarlo:',
      acciones:[{tipo:'vencimiento',resumen:`${nombre} - Lote: ${loteMatch?loteMatch[1]:'-'} - Vence: ${fecha} - ${qtyMatch?qtyMatch[1]:0} unid.`,datos:{nombre,lote:loteMatch?loteMatch[1]:'-',cat:'Otro',fecha,qty:parseInt(qtyMatch?qtyMatch[1]:0)}}]
    };
  }

  // Detectar recordatorio
  if(t.includes('recuérdame')||t.includes('recuerdame')||t.includes('avísame')||t.includes('avisame')){
    const horaMatch=texto.match(/(\d{1,2})(?::(\d{2}))?\s*(am|pm|de la tarde|de la mañana)?/i);
    let hora='08:00';
    if(horaMatch){
      let h=parseInt(horaMatch[1]); const m=horaMatch[2]||'00';
      if(horaMatch[3]&&(horaMatch[3].toLowerCase().includes('pm')||horaMatch[3].toLowerCase().includes('tarde'))&&h<12) h+=12;
      hora=String(h).padStart(2,'0')+':'+m;
    }
    const msg=texto.replace(/recuérdame|recuerdame|avísame|avisame|a las \d+.*/gi,'').trim()||'Revisar almacén';
    return {
      texto:'⏰ Activaré este recordatorio. Confirma:',
      acciones:[{tipo:'recordatorio',resumen:`Recordatorio a las ${hora}: ${msg}`,datos:{texto:msg,hora}}]
    };
  }

  // Detectar tarea
  if(t.includes('tarea')||t.includes('agrega')&&t.includes('las')){
    const horaMatch=texto.match(/(\d{1,2})(?::(\d{2}))?\s*(am|pm)?/i);
    let hora='08:00';
    if(horaMatch){
      let h=parseInt(horaMatch[1]); const m=horaMatch[2]||'00';
      if(horaMatch[3]&&horaMatch[3].toLowerCase()==='pm'&&h<12) h+=12;
      hora=String(h).padStart(2,'0')+':'+m;
    }
    const nombre=texto.replace(/agrega(me)?|tarea|a las \d+.*/gi,'').trim()||'Nueva tarea';
    return {
      texto:'✅ Aquí está la tarea. Confirma para agregarla:',
      acciones:[{tipo:'tarea',resumen:`Tarea a las ${hora}: ${nombre}`,datos:{nombre,hora,prio:'media',cat:'Otro'}}]
    };
  }

  const pends=tareasHoy.filter(t=>!t.done);
  if(t.includes('tarea')||t.includes('pendiente')) return {texto:pends.length?`Tienes ${pends.length} tarea(s) pendiente(s): ${pends.map(t=>t.nombre).join(', ')}.`:'✅ ¡Todo completado!',acciones:[]};
  return {texto:'🤖 Puedo agregar productos a Sheets, crear recordatorios y tareas. ¿Qué necesitas?',acciones:[]};
}

  const nombre=document.getElementById('r-nombre').value.trim();
  const qty=document.getElementById('r-qty').value||'1';
  const estado=document.getElementById('r-estado').value;
  const obs=document.getElementById('r-obs').value.trim();
  if(!nombre){toast('Escribe el proveedor');return;}
  const ahora=new Date();
  recepciones.push({id:nextIdR++,nombre,qty,estado,obs,fecha:ahora.toLocaleDateString('es-PE'),hora:ahora.toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'})});
  guardarTodo();cerrarPanel('recepcion');renderRecepciones();toast('✓ Registrado');
}

// ── REPORTE ───────────────────────────────────────────────────
function renderReporte(){
  const hoy=new Date().toISOString().split('T')[0];
  const th=tareas.filter(t=>t.fecha===hoy);
  const hechas=th.filter(t=>t.done);
  const pends=th.filter(t=>!t.done);
  const rh=recepciones.filter(r=>r.fecha===new Date().toLocaleDateString('es-PE'));
  const pct=th.length?Math.round(hechas.length/th.length*100):0;
  document.getElementById('contenido-reporte').innerHTML=`
    <div class="report-card"><div class="report-header"><div class="report-icon" style="background:#1e3a5f">✅</div><div><div class="report-title">Tareas completadas</div><div class="report-sub">${hechas.length} de ${th.length}</div></div><div style="margin-left:auto;font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--green)">${pct}%</div></div><div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:var(--green)"></div></div></div>
    <div class="report-card"><div class="report-header"><div class="report-icon" style="background:#1a2f1a">🚚</div><div><div class="report-title">Recepciones</div><div class="report-sub">${rh.length} hoy</div></div></div>${rh.map(r=>`<div style="font-size:13px;padding:5px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between"><span>${r.nombre}</span><span class="status-badge ${r.estado}">${r.estado}</span></div>`).join('')||'<div style="font-size:13px;color:var(--muted);padding:6px 0">Sin recepciones</div>'}</div>
    <div class="report-card"><div class="report-header"><div class="report-icon" style="background:#3a1a1a">⏳</div><div><div class="report-title">Pendientes</div><div class="report-sub">${pends.length} sin completar</div></div></div>${pends.map(t=>`<div style="font-size:13px;padding:5px 0;border-bottom:1px solid var(--border);display:flex;gap:8px"><span class="prio ${t.prio}">${t.prio}</span><span>${t.nombre}</span></div>`).join('')||'<div style="font-size:13px;color:var(--green);padding:6px 0">✅ Todo completado</div>'}</div>`;
}

// ── PANELES ───────────────────────────────────────────────────
function abrirPanel(tipo){ document.getElementById('overlay-'+tipo).classList.add('open'); }
function cerrarPanel(tipo,e){
  if(e&&e.target!==document.getElementById('overlay-'+tipo))return;
  document.getElementById('overlay-'+tipo).classList.remove('open');
}
function toast(msg){ const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500); }

if(window.innerWidth<=600) document.querySelector('.bottom-nav').style.display='flex';
renderDashboard();
</script>
</body>
</html>
