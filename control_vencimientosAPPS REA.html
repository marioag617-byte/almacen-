<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<title>Almacén — Control de Vencimientos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0f172a;--bg2:#1e293b;--bg3:#263348;--border:#334155;
    --text:#f1f5f9;--muted:#94a3b8;--accent:#38bdf8;
    --red:#f87171;--orange:#fb923c;--yellow:#fbbf24;--green:#4ade80;
    --red-bg:#450a0a;--orange-bg:#431407;--yellow-bg:#422006;--green-bg:#052e16;
    --radius:14px;--radius-sm:8px;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;-webkit-font-smoothing:antialiased}
  .app{display:flex;flex-direction:column;min-height:100dvh}

  /* HEADER */
  header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 16px 12px;position:sticky;top:0;z-index:100}
  .header-top{display:flex;align-items:center;justify-content:space-between}
  .header-title{font-size:17px;font-weight:600;letter-spacing:-0.3px}
  .header-sub{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px}
  .header-right{display:flex;align-items:center;gap:8px}
  .sync-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:5px 12px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'DM Sans',sans-serif;transition:all .2s;white-space:nowrap}
  .sync-btn:hover{border-color:var(--accent);color:var(--accent)}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
  .sync-dot.ok{background:var(--green)}
  .sync-dot.err{background:var(--red)}
  .sync-dot.spin{background:var(--accent);animation:blink 0.8s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
  .btn-add-top{background:var(--accent);color:#0f172a;border:none;border-radius:50%;width:36px;height:36px;font-size:22px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s,opacity .15s}
  .btn-add-top:active{transform:scale(0.92);opacity:.85}

  /* STATUS BAR */
  .status-bar{background:var(--bg3);border-bottom:1px solid var(--border);padding:5px 16px;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;min-height:28px}

  /* STATS */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border)}
  .stat{background:var(--bg3);border-radius:var(--radius-sm);padding:8px 6px;text-align:center;cursor:pointer;border:1.5px solid transparent;transition:opacity .15s}
  .stat:active{opacity:.7}
  .stat.active-filter{border-color:var(--accent)}
  .stat-num{font-size:22px;font-weight:600;font-family:'DM Mono',monospace;line-height:1}
  .stat-lbl{font-size:9px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.04em}
  .stat-num.red{color:var(--red)}.stat-num.orange{color:var(--orange)}.stat-num.yellow{color:var(--yellow)}.stat-num.green{color:var(--green)}

  /* SEARCH */
  .search-bar{padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border)}
  .search-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:9px 12px;outline:none;transition:border-color .2s}
  .search-input:focus{border-color:var(--accent)}
  .search-input::placeholder{color:var(--muted)}

  /* LIST */
  .list-wrap{flex:1;overflow-y:auto;padding:12px 16px 100px}
  .section-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 6px}
  .section-label:first-child{margin-top:0}
  .product-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px;margin-bottom:8px;display:flex;align-items:center;gap:10px;animation:slideIn .2s ease}
  @keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .dot.red{background:var(--red)}.dot.orange{background:var(--orange)}.dot.yellow{background:var(--yellow)}.dot.green{background:var(--green)}
  .card-info{flex:1;min-width:0}
  .card-nombre{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-meta{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .qty-pill{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:1px 8px;font-size:10px;color:var(--accent);font-weight:600;white-space:nowrap}
  .card-right{text-align:right;flex-shrink:0}
  .card-fecha{font-size:12px;font-family:'DM Mono',monospace;color:var(--muted)}
  .badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;margin-top:3px;letter-spacing:.03em}
  .badge.vencido{background:var(--red-bg);color:var(--red)}.badge.critico{background:var(--orange-bg);color:var(--orange)}.badge.alerta{background:var(--yellow-bg);color:var(--yellow)}.badge.ok{background:var(--green-bg);color:var(--green)}
  .del-btn{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;border-radius:6px;flex-shrink:0;transition:color .15s,background .15s}
  .del-btn:active{color:var(--red);background:var(--red-bg)}

  .empty-state{text-align:center;padding:3rem 1rem;color:var(--muted)}
  .empty-state .icon{font-size:44px;margin-bottom:12px}
  .empty-state p{font-size:14px;line-height:1.6}

  /* LOADING */
  .loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 1rem;gap:14px}
  .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-txt{font-size:13px;color:var(--muted)}

  /* MODAL */
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;align-items:flex-end}
  .overlay.open{display:flex}
  .modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;padding:20px 20px 40px;width:100%;animation:slideUp .25s ease;max-height:92dvh;overflow-y:auto}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-title{font-size:17px;font-weight:600;margin-bottom:18px}
  .modal-close{position:absolute;right:20px;top:20px;background:var(--bg3);border:none;color:var(--muted);width:30px;height:30px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .field{margin-bottom:14px}
  .field label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:6px}
  .field input,.field select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;padding:11px 14px;outline:none;transition:border-color .2s;-webkit-appearance:none}
  .field input:focus,.field select:focus{border-color:var(--accent)}
  .field select option{background:var(--bg2)}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  .field-row .field{margin-bottom:0}
  .btn-guardar{width:100%;background:var(--accent);color:#0f172a;border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;padding:14px;cursor:pointer;margin-top:4px;transition:opacity .15s,transform .15s}
  .btn-guardar:active{opacity:.85;transform:scale(0.98)}
  .btn-guardar:disabled{opacity:.4;cursor:not-allowed;transform:none}

  /* TOAST */
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(40px);background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:30px;font-size:13px;z-index:999;transition:transform .3s,opacity .3s;white-space:nowrap;pointer-events:none;opacity:0}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}

  /* BOTTOM NAV */
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding:8px 0 env(safe-area-inset-bottom,8px);z-index:100}
  .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:10px;cursor:pointer;padding:4px 0;transition:color .15s}
  .nav-btn.active{color:var(--accent)}
  .nav-icon{font-size:20px}

  @media(min-width:480px){
    .list-wrap,.stats,.search-bar,header,.status-bar{max-width:540px;margin-left:auto;margin-right:auto}
    .modal{max-width:480px;margin:0 auto;border-radius:var(--radius)}
    .overlay{align-items:center}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-top">
      <div>
        <div class="header-title">Control de Vencimientos</div>
        <div class="header-sub" id="fecha-hoy"></div>
      </div>
      <div class="header-right">
        <button class="sync-btn" onclick="sincronizar()" id="sync-btn">
          <span class="sync-dot" id="sync-dot"></span>
          <span id="sync-lbl">Sincronizar</span>
        </button>
        <button class="btn-add-top" onclick="abrirModal()">+</button>
      </div>
    </div>
  </header>

  <div class="status-bar" id="status-bar">⟳ Conectando con Google Sheets...</div>

  <div class="stats">
    <div class="stat" onclick="filtrar('vencido',this)"><div class="stat-num red" id="cnt-v">—</div><div class="stat-lbl">Vencido</div></div>
    <div class="stat" onclick="filtrar('critico',this)"><div class="stat-num orange" id="cnt-c">—</div><div class="stat-lbl">Crítico</div></div>
    <div class="stat" onclick="filtrar('alerta',this)"><div class="stat-num yellow" id="cnt-a">—</div><div class="stat-lbl">Alerta</div></div>
    <div class="stat" onclick="filtrar('ok',this)"><div class="stat-num green" id="cnt-o">—</div><div class="stat-lbl">OK</div></div>
  </div>

  <div class="search-bar">
    <input class="search-input" type="search" placeholder="Buscar producto, lote o categoría..." id="buscador" oninput="render()" autocomplete="off">
  </div>

  <div class="list-wrap" id="lista">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <div class="loading-txt">Cargando desde Google Sheets...</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="setNav('todos',this)"><span class="nav-icon">📦</span>Todos</button>
    <button class="nav-btn" onclick="setNav('urgente',this)"><span class="nav-icon">🚨</span>Urgentes</button>
    <button class="nav-btn" onclick="setNav('ok',this)"><span class="nav-icon">✅</span>Sin alerta</button>
  </nav>
</div>

<!-- MODAL AGREGAR -->
<div class="overlay" id="overlay" onclick="cerrarModal(event)">
  <div class="modal" style="position:relative">
    <button class="modal-close" onclick="cerrarModal()">×</button>
    <div class="modal-title">Nuevo producto</div>
    <div class="field">
      <label>Nombre del producto</label>
      <input type="text" id="inp-nombre" placeholder="Ej: Leche evaporada Gloria" autocomplete="off">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Lote / Código</label>
        <input type="text" id="inp-lote" placeholder="Ej: L-001" autocomplete="off">
      </div>
      <div class="field">
        <label>Cantidad (unid.)</label>
        <input type="number" id="inp-qty" placeholder="Ej: 24" min="1">
      </div>
    </div>
    <div class="field">
      <label>Categoría</label>
      <select id="inp-cat">
        <option value="" disabled selected>— Selecciona —</option>
        <option disabled>── ABARROTES ──</option>
        <option>Arroz y cereales</option><option>Fideos y pastas</option>
        <option>Harinas y premezclas</option><option>Azúcar y endulzantes</option>
        <option>Sal y condimentos</option><option>Salsas y aderezos</option>
        <option>Aceites y grasas</option><option>Conservas y enlatados</option>
        <option>Menestras</option>
        <option disabled>── LÁCTEOS Y HUEVOS ──</option>
        <option>Leche fresca y UHT</option><option>Leche evaporada y en polvo</option>
        <option>Yogur y postres lácteos</option><option>Quesos y mantequilla</option>
        <option>Crema y nata</option><option>Huevos</option>
        <option disabled>── BEBIDAS ──</option>
        <option>Agua y bebidas hidratantes</option><option>Gaseosas y refrescos</option>
        <option>Jugos y néctares</option><option>Bebidas energéticas</option>
        <option>Bebidas instantáneas</option><option>Cerveza</option>
        <option>Bebidas alcohólicas</option>
        <option disabled>── SNACKS Y DULCES ──</option>
        <option>Galletas y bizcochos</option><option>Chocolates y caramelos</option>
        <option>Snacks y papitas</option><option>Panetones y panes envasados</option>
        <option>Mermeladas y jaleas</option>
        <option disabled>── LIMPIEZA DEL HOGAR ──</option>
        <option>Detergentes y jabón ropa</option><option>Suavizantes y lejía</option>
        <option>Limpiapisos y desinfectantes</option><option>Lavavajillas</option>
        <option>Ambientadores</option><option>Insecticidas y repelentes</option>
        <option>Papel higiénico y servilletas</option><option>Bolsas y papel film</option>
        <option disabled>── CUIDADO PERSONAL ──</option>
        <option>Champú y acondicionador</option><option>Jabón de baño</option>
        <option>Pasta dental y bucal</option><option>Desodorantes</option>
        <option>Cremas y lociones</option><option>Maquillaje y cosméticos</option>
        <option>Protección femenina</option><option>Pañales y toallitas bebé</option>
        <option>Rasuradoras y depilación</option>
        <option disabled>── FARMACIA Y SALUD ──</option>
        <option>Medicamentos sin receta</option><option>Vitaminas y suplementos</option>
        <option>Primeros auxilios</option>
        <option disabled>── OTROS ──</option>
        <option>Alimentos para mascotas</option><option>Otro</option>
      </select>
    </div>
    <div class="field">
      <label>Fecha de vencimiento</label>
      <input type="date" id="inp-fecha">
    </div>
    <button class="btn-guardar" id="btn-guardar" onclick="agregarProducto()">Guardar en Google Sheets</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIGURACIÓN ─────────────────────────────────────────────
const API_URL = 'https://script.google.com/macros/s/AKfycbzqD-Y1hxzyOcH1vak5mCwsBLtweLDF4cUpNiUY6l5yOsmisspwz_Qn3MAcduK3bh1FPw/exec';

// ── ESTADO ────────────────────────────────────────────────────
const HOY = new Date(); HOY.setHours(0,0,0,0);
let productos = [];
let filtroEstado = null;
let navActivo = 'todos';
let cargando = false;

document.getElementById('fecha-hoy').textContent =
  HOY.toLocaleDateString('es-PE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});

// ── API CALLS ─────────────────────────────────────────────────
async function apiCall(datos) {
  // Apps Script necesita JSONP o no-cors para POST desde HTML local
  // Usamos fetch con modo no-cors + GET para leer, POST para escribir
  const url = API_URL + '?accion=' + datos.accion +
    (datos.accion === 'eliminar' ? '&fila=' + datos.fila : '');

  if (datos.accion === 'leer') {
    const res = await fetch(url + '&v=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await res.json();
  } else {
    // POST via fetch
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify(datos),
      headers: { 'Content-Type': 'text/plain' } // evita preflight CORS
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await res.json();
  }
}

// ── SINCRONIZAR (LEER) ────────────────────────────────────────
async function sincronizar() {
  if (cargando) return;
  cargando = true;
  setSyncState('spin', 'Cargando...');
  setStatus('⟳ Sincronizando con Google Sheets...');

  try {
    const resp = await apiCall({ accion: 'leer' });
    if (!resp.ok) throw new Error(resp.error);
    productos = resp.productos || [];
    render();
    const hora = new Date().toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'});
    setSyncState('ok', hora);
    setStatus(`✓ ${productos.length} productos · última sync ${hora}`);
  } catch(e) {
    setSyncState('err', 'Error');
    setStatus('⚠️ Sin conexión con Google Sheets — ' + e.message);
    mostrarError();
    console.error(e);
  } finally {
    cargando = false;
  }
}

// ── AGREGAR ───────────────────────────────────────────────────
async function agregarProducto() {
  const nombre = document.getElementById('inp-nombre').value.trim();
  const lote   = document.getElementById('inp-lote').value.trim();
  const qty    = parseInt(document.getElementById('inp-qty').value) || 0;
  const cat    = document.getElementById('inp-cat').value;
  const fecha  = document.getElementById('inp-fecha').value;

  if (!nombre || !fecha || !cat) { toast('⚠️ Completa nombre, categoría y fecha'); return; }

  const btn = document.getElementById('btn-guardar');
  btn.disabled = true;
  btn.textContent = '⟳ Guardando en Sheets...';

  try {
    const resp = await apiCall({ accion: 'agregar', nombre, lote: lote||'-', qty, cat, fecha });
    if (!resp.ok) throw new Error(resp.error);
    cerrarModal();
    toast('✓ Guardado en Google Sheets');
    await sincronizar();
  } catch(e) {
    toast('⚠️ Error al guardar: ' + e.message);
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Guardar en Google Sheets';
  }
}

// ── ELIMINAR ──────────────────────────────────────────────────
async function eliminar(fila, nombre) {
  if (!confirm(`¿Eliminar "${nombre}"?\nSe borrará también de Google Sheets.`)) return;
  setSyncState('spin','Eliminando...');
  try {
    const resp = await apiCall({ accion: 'eliminar', fila });
    if (!resp.ok) throw new Error(resp.error);
    toast('🗑 Eliminado de Google Sheets');
    await sincronizar();
  } catch(e) {
    toast('⚠️ Error al eliminar: ' + e.message);
    setSyncState('err','Error');
    console.error(e);
  }
}

// ── RENDER ────────────────────────────────────────────────────
function dias(f) { return f ? Math.round((new Date(f+'T00:00:00') - HOY) / 86400000) : 999; }
function estado(d) { if(d<0)return'vencido'; if(d<=4)return'critico'; if(d<=7)return'alerta'; return'ok'; }
const DOTS = {vencido:'red',critico:'orange',alerta:'yellow',ok:'green'};
function diasLabel(d) {
  if(d<0)  return `Venció hace ${Math.abs(d)} día${Math.abs(d)===1?'':'s'}`;
  if(d===0)return 'Vence hoy';
  if(d===1)return 'Vence mañana';
  return `${d} días`;
}
function fechaFmt(f) {
  return f ? new Date(f+'T00:00:00').toLocaleDateString('es-PE',{day:'2-digit',month:'short',year:'2-digit'}) : '-';
}

function render() {
  const busq = document.getElementById('buscador').value.toLowerCase();

  let lista = productos.filter(p => {
    const mB = !busq ||
      p.nombre.toLowerCase().includes(busq) ||
      p.lote.toLowerCase().includes(busq) ||
      p.cat.toLowerCase().includes(busq);
    const d = dias(p.fecha), e = estado(d);
    let mF = true;
    if (filtroEstado) mF = e === filtroEstado;
    if (navActivo === 'urgente') mF = mF && (e==='vencido'||e==='critico'||e==='alerta');
    if (navActivo === 'ok') mF = mF && e === 'ok';
    return mB && mF;
  });
  lista.sort((a,b) => dias(a.fecha) - dias(b.fecha));

  // Contadores
  let cv=0,cc=0,ca=0,co=0;
  productos.forEach(p => {
    const e = estado(dias(p.fecha));
    if(e==='vencido')cv++; else if(e==='critico')cc++; else if(e==='alerta')ca++; else co++;
  });
  document.getElementById('cnt-v').textContent = cv;
  document.getElementById('cnt-c').textContent = cc;
  document.getElementById('cnt-a').textContent = ca;
  document.getElementById('cnt-o').textContent = co;

  const cont = document.getElementById('lista');
  if (!lista.length) {
    cont.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>Sin productos en esta vista.<br><small>Toca + para agregar o sincroniza.</small></p></div>`;
    return;
  }

  const grupos = {vencido:[],critico:[],alerta:[],ok:[]};
  lista.forEach(p => grupos[estado(dias(p.fecha))].push(p));
  const titulos = {
    vencido:'🔴 Vencidos',
    critico:'🟠 Críticos — vencen en 1 a 4 días',
    alerta: '🟡 En alerta — vencen en 5 a 7 días',
    ok:     '🟢 Sin alerta'
  };

  let html = '';
  ['vencido','critico','alerta','ok'].forEach(g => {
    if (!grupos[g].length) return;
    html += `<div class="section-label">${titulos[g]}</div>`;
    grupos[g].forEach(p => {
      const d = dias(p.fecha), e = estado(d);
      const qHtml = p.qty ? `<span class="qty-pill">${p.qty} unid.</span>` : '';
      const nom = p.nombre.replace(/'/g,"\\'").replace(/"/g,'&quot;');
      html += `<div class="product-card">
        <span class="dot ${DOTS[e]}"></span>
        <div class="card-info">
          <div class="card-nombre">${p.nombre}</div>
          <div class="card-meta"><span>${p.lote} · ${p.cat}</span>${qHtml}</div>
        </div>
        <div class="card-right">
          <div class="card-fecha">${fechaFmt(p.fecha)}</div>
          <span class="badge ${e}">${diasLabel(d)}</span>
        </div>
        <button class="del-btn" onclick="eliminar(${p.fila},'${nom}')">×</button>
      </div>`;
    });
  });
  cont.innerHTML = html;
}

function mostrarError() {
  document.getElementById('lista').innerHTML = `
    <div class="empty-state">
      <div class="icon">⚠️</div>
      <p>No se pudo conectar con Google Sheets.<br>
      <small>Verifica tu conexión a internet<br>y toca "Sincronizar" para reintentar.</small></p>
    </div>`;
}

// ── UI UTILS ──────────────────────────────────────────────────
function filtrar(e, el) {
  if (filtroEstado === e) {
    filtroEstado = null;
    document.querySelectorAll('.stat').forEach(s => s.classList.remove('active-filter'));
  } else {
    filtroEstado = e;
    document.querySelectorAll('.stat').forEach(s => s.classList.remove('active-filter'));
    el.classList.add('active-filter');
  }
  render();
}
function setNav(tab, el) {
  navActivo = tab; filtroEstado = null;
  document.querySelectorAll('.stat').forEach(s => s.classList.remove('active-filter'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}
function abrirModal() {
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('inp-nombre').focus(), 100);
}
function cerrarModal(e) {
  if (e && e.target !== document.getElementById('overlay')) return;
  document.getElementById('overlay').classList.remove('open');
  ['inp-nombre','inp-lote','inp-qty','inp-fecha'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('inp-cat').selectedIndex = 0;
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
function setSyncState(state, label) {
  document.getElementById('sync-dot').className = 'sync-dot ' + state;
  document.getElementById('sync-lbl').textContent = label;
}
function setStatus(msg) {
  document.getElementById('status-bar').textContent = msg;
}

// ── INICIO ────────────────────────────────────────────────────
sincronizar();
setInterval(sincronizar, 60000);
</script>
</body>
