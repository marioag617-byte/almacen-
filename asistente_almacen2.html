<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0f1e">
<title>Asistente Almacén</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0f1e;--bg2:#111827;--bg3:#1a2235;--bg4:#1f2d45;
  --border:#2a3a55;--border2:#3a4f70;
  --text:#e8f0fe;--muted:#7a90b0;--hint:#4a6080;
  --accent:#4f9cf9;--accent2:#38bdf8;--green:#34d399;
  --orange:#fb923c;--red:#f87171;--yellow:#fbbf24;--purple:#a78bfa;
  --radius:12px;--radius-sm:8px;--radius-lg:18px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;-webkit-font-smoothing:antialiased;overflow:hidden}
.shell{display:flex;height:100dvh;overflow:hidden}
.sidebar{width:64px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:6px;flex-shrink:0;z-index:10}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.nav-ico{width:44px;height:44px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;border:1.5px solid transparent;transition:all .2s;color:var(--muted)}
.nav-ico:hover{background:var(--bg3);color:var(--text)}
.nav-ico.active{background:var(--bg4);border-color:var(--border2);color:var(--accent)}
.nav-ico.logo{font-size:22px;color:var(--accent);margin-bottom:8px;cursor:default;border:none}
.nav-sep{width:32px;height:1px;background:var(--border);margin:4px 0}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:600;letter-spacing:-.2px}
.topbar-sub{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px}
.hora-badge{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:11px;font-family:'DM Mono',monospace;color:var(--accent2)}
.page{display:none;flex:1;overflow-y:auto;padding:16px 20px 80px}
.page.active{display:block}

/* ── CHAT ── */
.chat-page{display:none;flex:1;flex-direction:column;overflow:hidden}
.chat-page.active{display:flex}
.chat-msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.msg{display:flex;gap:10px;align-items:flex-start;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px}
.msg.ai .msg-avatar{background:linear-gradient(135deg,#1e40af,#4f9cf9);color:#fff}
.msg.user .msg-avatar{background:var(--bg4);border:1px solid var(--border2)}
.msg-bubble{max-width:78%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg) var(--radius-lg) var(--radius-lg) 4px;padding:10px 14px;font-size:14px;line-height:1.6}
.msg.user .msg-bubble{background:var(--bg4);border-color:var(--border2);border-radius:var(--radius-lg) var(--radius-lg) 4px var(--radius-lg)}
.typing-dots span{display:inline-block;animation:dot 1.2s infinite;opacity:0;font-size:18px}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{opacity:0}40%{opacity:1}}

/* Botón de tarea sugerida */
.task-sugerida{background:var(--bg4);border:1px solid var(--accent);border-radius:var(--radius-sm);padding:8px 12px;margin-top:8px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.task-sugerida-txt{font-size:13px;color:var(--accent2)}
.btn-agregar-tarea{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:opacity .15s}
.btn-agregar-tarea:active{opacity:.8}

/* ── INPUT DE CHAT ── */
.chat-input-wrap{padding:10px 14px;border-top:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;gap:8px}
.chat-input-row{display:flex;gap:8px;align-items:flex-end}
.chat-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 14px;outline:none;resize:none;min-height:44px;max-height:200px;line-height:1.5;transition:border-color .2s,min-height .2s}
.chat-input:focus{border-color:var(--accent);min-height:80px}
.chat-input::placeholder{color:var(--muted)}
.chat-btns{display:flex;gap:6px;align-items:flex-end}

/* Botón micrófono */
.mic-btn{width:44px;height:44px;border-radius:50%;background:var(--bg3);border:1.5px solid var(--border);color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all .2s;flex-shrink:0}
.mic-btn:hover{border-color:var(--accent);color:var(--accent)}
.mic-btn.grabando{background:#450a0a;border-color:var(--red);color:var(--red);animation:pulseRed 1s infinite}
@keyframes pulseRed{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.4)}50%{box-shadow:0 0 0 8px rgba(248,113,113,0)}}

/* Indicador de voz */
.voz-indicator{display:none;align-items:center;gap:8px;padding:6px 12px;background:#450a0a;border:1px solid var(--red);border-radius:var(--radius-sm);font-size:12px;color:var(--red)}
.voz-indicator.show{display:flex}
.voz-waves{display:flex;gap:3px;align-items:center}
.voz-wave{width:3px;background:var(--red);border-radius:2px;animation:wave 0.6s infinite alternate}
.voz-wave:nth-child(1){height:8px;animation-delay:0s}
.voz-wave:nth-child(2){height:16px;animation-delay:.1s}
.voz-wave:nth-child(3){height:10px;animation-delay:.2s}
.voz-wave:nth-child(4){height:20px;animation-delay:.3s}
.voz-wave:nth-child(5){height:8px;animation-delay:.4s}
@keyframes wave{from{transform:scaleY(1)}to{transform:scaleY(.3)}}

.send-btn{width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0;transition:opacity .15s,transform .15s}
.send-btn:active{opacity:.8;transform:scale(.95)}
.send-btn:disabled{opacity:.4;cursor:not-allowed}

/* ── DASHBOARD ── */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.card-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.metric{background:var(--bg3);border-radius:var(--radius-sm);padding:12px 10px;text-align:center}
.metric-num{font-size:26px;font-weight:700;font-family:'Syne',sans-serif;line-height:1}
.metric-lbl{font-size:9px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.04em}
.metric-num.accent{color:var(--accent)}.metric-num.green{color:var(--green)}.metric-num.orange{color:var(--orange)}.metric-num.red{color:var(--red)}
.section-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}

/* ── TAREAS ── */
.task-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:border-color .2s}
.task-item:hover{border-color:var(--border2)}
.task-check{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.task-check.done{background:var(--green);border-color:var(--green);color:#fff;font-size:11px}
.task-body{flex:1;min-width:0}
.task-name{font-size:14px;font-weight:500}
.task-name.done{text-decoration:line-through;color:var(--muted)}
.task-meta{font-size:11px;color:var(--muted);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
.prio{padding:1px 7px;border-radius:20px;font-size:10px;font-weight:600}
.prio.alta{background:#450a0a;color:var(--red)}.prio.media{background:#422006;color:var(--orange)}.prio.baja{background:#052e16;color:var(--green)}
.task-del{background:none;border:none;color:var(--hint);cursor:pointer;font-size:16px;padding:2px 6px;border-radius:4px}
.task-del:hover{color:var(--red)}

/* ── RECEPCIONES ── */
.recep-item{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:8px}
.recep-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.recep-nombre{font-size:14px;font-weight:500}
.recep-meta{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;display:flex;gap:10px;flex-wrap:wrap}
.status-badge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.status-badge.pendiente{background:#422006;color:var(--orange)}
.status-badge.recibido{background:#052e16;color:var(--green)}
.status-badge.revision{background:#1e1a4a;color:var(--purple)}

/* ── FORMULARIOS ── */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.field{margin-bottom:12px}
.field label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:9px 12px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field select option{background:var(--bg2)}
.btn{padding:9px 18px;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:opacity .15s,transform .15s;display:inline-flex;align-items:center;gap:6px}
.btn:active{opacity:.8;transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-ghost{background:var(--bg3);color:var(--muted);border:1px solid var(--border)}

/* ── REPORTE ── */
.report-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.report-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.report-icon{width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.report-title{font-size:14px;font-weight:600}
.report-sub{font-size:11px;color:var(--muted)}
.bar-wrap{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden;margin-top:8px}
.bar-fill{height:100%;border-radius:3px;transition:width .6s ease}

/* ── TOAST ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--bg4);border:1px solid var(--border2);color:var(--text);padding:9px 18px;border-radius:30px;font-size:13px;z-index:999;transition:transform .3s,opacity .3s;white-space:nowrap;pointer-events:none;opacity:0}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ── BOTTOM NAV ── */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding:8px 0 env(safe-area-inset-bottom,8px);z-index:100}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:9px;cursor:pointer;padding:4px 0;transition:color .15s}
.bnav-btn.active{color:var(--accent)}
.bnav-icon{font-size:20px}

/* ── PANELES ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;align-items:flex-end}
.overlay.open{display:flex}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:20px 20px 36px;width:100%;max-height:90dvh;overflow-y:auto;animation:slideUp .25s ease;position:relative}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.panel-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:600;margin-bottom:16px}
.panel-close{position:absolute;right:18px;top:18px;background:var(--bg3);border:none;color:var(--muted);width:28px;height:28px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}

@media(max-width:600px){
  .sidebar{display:none}
  .bottom-nav{display:flex!important}
  .grid-4{grid-template-columns:repeat(2,1fr)}
  .form-row{grid-template-columns:1fr}
}
@media(min-width:601px){
  .overlay{align-items:center}
  .panel{max-width:480px;margin:0 auto;border-radius:var(--radius-lg)}
}
</style>
</head>
<body>
<div class="shell">
  <nav class="sidebar">
    <div class="nav-ico logo">📦</div>
    <div class="nav-sep"></div>
    <div class="nav-ico active" onclick="irA('dashboard',this)" title="Dashboard">🏠</div>
    <div class="nav-ico" onclick="irA('chat',this)" title="Asistente IA">🤖</div>
    <div class="nav-ico" onclick="irA('tareas',this)" title="Tareas">✅</div>
    <div class="nav-ico" onclick="irA('recepciones',this)" title="Recepciones">🚚</div>
    <div class="nav-ico" onclick="irA('reporte',this)" title="Reporte">📊</div>
  </nav>

  <div class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title" id="page-title">Dashboard</div>
        <div class="topbar-sub" id="page-sub">Resumen del día</div>
      </div>
      <div class="hora-badge" id="reloj">--:--</div>
    </div>

    <!-- DASHBOARD -->
    <div class="page active" id="pg-dashboard">
      <div class="grid-4">
        <div class="metric"><div class="metric-num accent" id="d-tareas">0</div><div class="metric-lbl">Tareas hoy</div></div>
        <div class="metric"><div class="metric-num green" id="d-hechas">0</div><div class="metric-lbl">Completadas</div></div>
        <div class="metric"><div class="metric-num orange" id="d-recep">0</div><div class="metric-lbl">Recepciones</div></div>
        <div class="metric"><div class="metric-num red" id="d-pend">0</div><div class="metric-lbl">Pendientes</div></div>
      </div>
      <div class="card" style="margin-bottom:14px">
        <div class="card-title">Tareas pendientes hoy</div>
        <div id="d-lista-tareas"></div>
      </div>
      <div class="card" style="margin-bottom:14px">
        <div class="card-title">Últimas recepciones</div>
        <div id="d-lista-recep"></div>
      </div>
      <div class="card">
        <div class="card-title">Recordatorios del día</div>
        <div id="d-recordatorios"></div>
      </div>
    </div>

    <!-- CHAT IA -->
    <div class="chat-page" id="pg-chat">
      <div class="chat-msgs" id="chat-msgs"></div>
      <div class="chat-input-wrap">
        <!-- Indicador de grabación -->
        <div class="voz-indicator" id="voz-indicator">
          <div class="voz-waves">
            <div class="voz-wave"></div><div class="voz-wave"></div>
            <div class="voz-wave"></div><div class="voz-wave"></div>
            <div class="voz-wave"></div>
          </div>
          <span>Escuchando... habla ahora</span>
        </div>
        <div class="chat-input-row">
          <textarea class="chat-input" id="chat-input"
            placeholder="Escribe o usa el micrófono... Ej: 'Agrégame una tarea para revisar el inventario a las 10am'"
            onkeydown="chatKeydown(event)"
            oninput="autoResize(this)"></textarea>
          <div class="chat-btns">
            <button class="mic-btn" id="mic-btn" onclick="toggleVoz()" title="Hablar">🎤</button>
            <button class="send-btn" id="send-btn" onclick="enviarMensaje()">➤</button>
          </div>
        </div>
      </div>
    </div>

    <!-- TAREAS -->
    <div class="page" id="pg-tareas">
      <div class="section-title">
        Tareas del día
        <button class="btn btn-primary" onclick="abrirPanel('tarea')" style="font-size:12px;padding:6px 12px">+ Nueva tarea</button>
      </div>
      <div id="lista-tareas"></div>
    </div>

    <!-- RECEPCIONES -->
    <div class="page" id="pg-recepciones">
      <div class="section-title">
        Control de recepciones
        <button class="btn btn-primary" onclick="abrirPanel('recepcion')" style="font-size:12px;padding:6px 12px">+ Registrar</button>
      </div>
      <div id="lista-recepciones"></div>
    </div>

    <!-- REPORTE -->
    <div class="page" id="pg-reporte">
      <div class="section-title">Reporte del día</div>
      <div id="contenido-reporte"></div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav" style="display:none">
  <button class="bnav-btn active" onclick="irA('dashboard',this)"><span class="bnav-icon">🏠</span>Inicio</button>
  <button class="bnav-btn" onclick="irA('chat',this)"><span class="bnav-icon">🤖</span>IA</button>
  <button class="bnav-btn" onclick="irA('tareas',this)"><span class="bnav-icon">✅</span>Tareas</button>
  <button class="bnav-btn" onclick="irA('recepciones',this)"><span class="bnav-icon">🚚</span>Recep.</button>
  <button class="bnav-btn" onclick="irA('reporte',this)"><span class="bnav-icon">📊</span>Reporte</button>
</nav>

<!-- PANEL TAREA -->
<div class="overlay" id="overlay-tarea" onclick="cerrarPanel('tarea',event)">
  <div class="panel">
    <button class="panel-close" onclick="cerrarPanel('tarea')">×</button>
    <div class="panel-title">Nueva tarea</div>
    <div class="field"><label>Nombre de la tarea</label><input type="text" id="t-nombre" placeholder="Ej: Revisar fechas de vencimiento"></div>
    <div class="form-row">
      <div class="field"><label>Hora</label><input type="time" id="t-hora"></div>
      <div class="field"><label>Prioridad</label>
        <select id="t-prio"><option value="alta">Alta</option><option value="media" selected>Media</option><option value="baja">Baja</option></select>
      </div>
    </div>
    <div class="field"><label>Categoría</label>
      <select id="t-cat">
        <option>Recepción de mercadería</option><option>Control de vencimientos</option>
        <option>Inventario</option><option>Limpieza y orden</option>
        <option>Reporte</option><option>Otro</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="agregarTarea()" style="width:100%;justify-content:center;padding:12px">Guardar tarea</button>
  </div>
</div>

<!-- PANEL RECEPCIÓN -->
<div class="overlay" id="overlay-recepcion" onclick="cerrarPanel('recepcion',event)">
  <div class="panel">
    <button class="panel-close" onclick="cerrarPanel('recepcion')">×</button>
    <div class="panel-title">Registrar recepción</div>
    <div class="field"><label>Proveedor / Producto</label><input type="text" id="r-nombre" placeholder="Ej: Distribuidora Norte — Lácteos"></div>
    <div class="form-row">
      <div class="field"><label>Cantidad bultos</label><input type="number" id="r-qty" placeholder="10" min="1"></div>
      <div class="field"><label>Estado</label>
        <select id="r-estado"><option value="pendiente">Pendiente</option><option value="recibido">Recibido</option><option value="revision">En revisión</option></select>
      </div>
    </div>
    <div class="field"><label>Observaciones</label><textarea id="r-obs" rows="2" placeholder="Ej: Producto en buen estado"></textarea></div>
    <button class="btn btn-primary" onclick="agregarRecepcion()" style="width:100%;justify-content:center;padding:12px">Registrar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATOS ─────────────────────────────────────────────────────
let tareas = JSON.parse(localStorage.getItem('asis_tareas2') || 'null') || [];
let recepciones = JSON.parse(localStorage.getItem('asis_recep2') || '[]');
let chatHistory = [];
let nextIdT = Date.now();
let nextIdR = Date.now() + 1;
let reconocimiento = null;
let grabando = false;

if (!tareas.length) {
  const hoy = new Date().toISOString().split('T')[0];
  tareas = [
    {id:1,nombre:'Revisar fechas de vencimiento',hora:'08:00',prio:'alta',cat:'Control de vencimientos',done:false,fecha:hoy},
    {id:2,nombre:'Recepción de mercadería del proveedor',hora:'09:00',prio:'alta',cat:'Recepción de mercadería',done:false,fecha:hoy},
    {id:3,nombre:'Inventario de productos secos',hora:'11:00',prio:'media',cat:'Inventario',done:false,fecha:hoy},

const paginas = {
  dashboard:{titulo:'Dashboard',sub:'Resumen del día'},
  chat:{titulo:'Asistente IA',sub:'Escribe o habla para interactuar'},
  tareas:{titulo:'Tareas',sub:'Gestión de actividades diarias'},

function irA(pagina, el){
  document.querySelectorAll('.page,.chat-page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg-'+pagina).classList.add('active');
  document.querySelectorAll('.nav-ico:not(.logo),.bnav-btn').forEach(b=>b.classList.remove('active'));

// ── VOZ (Speech Recognition) ──────────────────────────────────
function initVoz(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const r = new SR();
  r.lang = 'es-PE';
  r.continuous = false;
  r.interimResults = false;
  r.onresult = function(e){
    const texto = e.results[0][0].transcript;
    const input = document.getElementById('chat-input');
    input.value = texto;
    autoResize(input);
    detenerVoz();
    enviarMensaje();
  };
  r.onerror = function(e){
    detenerVoz();
    if(e.error==='not-allowed') toast('⚠️ Permiso de micrófono denegado');
    else toast('Error de micrófono: '+e.error);
  };
  r.onend = function(){ detenerVoz(); };
  return r;
}

function toggleVoz(){
  if(grabando){ detenerVoz(); return; }
  if(!reconocimiento) reconocimiento = initVoz();
  if(!reconocimiento){ toast('Tu navegador no soporta reconocimiento de voz'); return; }
  grabando = true;
  document.getElementById('mic-btn').classList.add('grabando');
  document.getElementById('mic-btn').textContent = '⏹';
  document.getElementById('voz-indicator').classList.add('show');
  try { reconocimiento.start(); }
  catch(e){ detenerVoz(); }
}

function detenerVoz(){
  grabando = false;
  document.getElementById('mic-btn').classList.remove('grabando');
  document.getElementById('mic-btn').textContent = '🎤';
  document.getElementById('voz-indicator').classList.remove('show');
  try { if(reconocimiento) reconocimiento.stop(); } catch(e){}
}

// ── CHAT IA ───────────────────────────────────────────────────
function mensajeBienvenida(){
  const hora = new Date().getHours();
  const saludo = hora<12?'Buenos días':hora<18?'Buenas tardes':'Buenas noches';
  agregarMsgIA(`${saludo} 👋 Soy tu asistente de almacén.\n\nPuedes **hablar** 🎤 o escribir. Por ejemplo:\n• "Agrégame una tarea: revisar vencimientos a las 9am"\n• "¿Cuántas tareas tengo pendientes?"\n• "Registra una recepción de Distribuidora Norte"\n• "Dame el resumen del día"\n\n¿En qué te ayudo?`);
}

function agregarMsgIA(texto, tareasSugeridas){
  const msgs = document.getElementById('chat-msgs');
  const div = document.createElement('div');
  div.className = 'msg ai';
  let html = `<div class="msg-avatar">🤖</div><div class="msg-bubble">${texto.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}`;
  if(tareasSugeridas && tareasSugeridas.length){
    tareasSugeridas.forEach(function(t,i){
      html += `<div class="task-sugerida">
        <span class="task-sugerida-txt">📋 ${t.nombre} ${t.hora?'a las '+t.hora:''}</span>
        <button class="btn-agregar-tarea" onclick="crearTareaDesdeIA(${i},event)">+ Agregar</button>
      </div>`;
    });
    div.dataset.tareas = JSON.stringify(tareasSugeridas);
  }
  html += '</div>';
  div.innerHTML = html;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function crearTareaDesdeIA(idx, e){
  const btn = e.target;
  const card = btn.closest('.msg');
  const tareasList = JSON.parse(card.dataset.tareas || '[]');
  const t = tareasList[idx];
  if(!t) return;
  const hoy = new Date().toISOString().split('T')[0];
  tareas.push({id:nextIdT++, nombre:t.nombre, hora:t.hora||'08:00', prio:t.prio||'media', cat:t.cat||'Otro', done:false, fecha:hoy});
  guardarTodo();
  btn.textContent = '✓ Agregada';
  btn.disabled = true;
  btn.style.background = 'var(--green)';
  toast('✓ Tarea agregada: '+t.nombre);
}

function agregarMsgUser(texto){
  const msgs = document.getElementById('chat-msgs');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="msg-avatar">👤</div><div class="msg-bubble">${texto}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function mostrarTyping(){
  const msgs = document.getElementById('chat-msgs');
  const div = document.createElement('div');
  div.className='msg ai'; div.id='typing-msg';
  div.innerHTML=`<div class="msg-avatar">🤖</div><div class="msg-bubble"><div class="typing-dots"><span>●</span><span>●</span><span>●</span></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}
function quitarTyping(){ const t=document.getElementById('typing-msg'); if(t)t.remove(); }

async function enviarMensaje(){
  const input = document.getElementById('chat-input');
  const texto = input.value.trim();
  if(!texto) return;
  input.value=''; input.style.height='auto';
  document.getElementById('send-btn').disabled=true;
  agregarMsgUser(texto);
  mostrarTyping();

  const hoy = new Date().toISOString().split('T')[0];
  const tareasHoy = tareas.filter(t=>t.fecha===hoy);
  const hechas = tareasHoy.filter(t=>t.done).length;
  const recepHoy = recepciones.filter(r=>r.fecha===new Date().toLocaleDateString('es-PE'));

  const sistema = `Eres un asistente experto en gestión de almacenes para una tienda de abarrotes en Perú (Lima).

DATOS ACTUALES:
- Fecha: ${new Date().toLocaleDateString('es-PE')}
- Hora: ${new Date().toLocaleTimeString('es-PE')}
- Tareas hoy: ${tareasHoy.length} total, ${hechas} completadas, ${tareasHoy.length-hechas} pendientes
- Tareas pendientes: ${tareasHoy.filter(t=>!t.done).map(t=>t.nombre+' ('+t.hora+')').join(', ')||'ninguna'}
- Recepciones hoy: ${recepHoy.length} (${recepHoy.map(r=>r.nombre).join(', ')||'ninguna'})

INSTRUCCIONES ESPECIALES:
- Si el usuario pide agregar una tarea (ej: "agrégame una tarea", "añade", "crea una tarea"), responde en JSON al final con este formato EXACTO:
  TAREAS_JSON:[{"nombre":"nombre de la tarea","hora":"HH:MM","prio":"alta|media|baja","cat":"categoria"}]
- Detecta la hora si la menciona (ej: "a las 10am" → "10:00", "a las 3 de la tarde" → "15:00")
- Detecta la prioridad por palabras como "urgente"=alta, "cuando puedas"=baja
- Si no hay hora específica, usa "08:00"
- Para el resto de consultas, responde normal, conciso, máximo 3-4 oraciones, con emojis.`;

  chatHistory.push({role:'user', content:texto});

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:sistema,
        messages:chatHistory.slice(-10)
      })
    });
    const data = await response.json();
    let respuesta = data.content?.[0]?.text || 'No pude procesar tu consulta.';

    // Extraer tareas del JSON si las hay
    let tareasExtraidas = [];
    const jsonMatch = respuesta.match(/TAREAS_JSON:\s*(\[.*?\])/s);
    if(jsonMatch){
      try {
        tareasExtraidas = JSON.parse(jsonMatch[1]);
        respuesta = respuesta.replace(/TAREAS_JSON:\s*\[.*?\]/s,'').trim();
      } catch(e){}
    }

    chatHistory.push({role:'assistant', content:respuesta});
    quitarTyping();
    agregarMsgIA(respuesta, tareasExtraidas);
  } catch(e){
    quitarTyping();
    const resp = respuestaLocal(texto);
    chatHistory.push({role:'assistant', content:resp.texto});
    agregarMsgIA(resp.texto, resp.tareas);
  } finally {
    document.getElementById('send-btn').disabled=false;
    input.focus();
  }
}

// Respuesta offline con detección de tareas
function respuestaLocal(texto){
  const t = texto.toLowerCase();
  const hoy = new Date().toISOString().split('T')[0];
  const tareasHoy = tareas.filter(t=>t.fecha===hoy);
  const hechas = tareasHoy.filter(t=>t.done).length;

  // Detectar intención de agregar tarea
  if(t.includes('agrega') || t.includes('añade') || t.includes('crea') || t.includes('nueva tarea') || t.includes('agrégame')){
    const horaMatch = texto.match(/(\d{1,2})(?::(\d{2}))?\s*(?:am|pm|de la mañana|de la tarde|del mediodía)?/i);
    let hora = '08:00';
    if(horaMatch){
      let h = parseInt(horaMatch[1]);
      const m = horaMatch[2] || '00';
      if(texto.toLowerCase().includes('pm')||texto.toLowerCase().includes('tarde')) h = h<12?h+12:h;
      hora = String(h).padStart(2,'0')+':'+m;
    }
    const prio = t.includes('urgente')||t.includes('importante')?'alta':t.includes('cuando puedas')||t.includes('después')?'baja':'media';

    // Extraer nombre de la tarea
    let nombre = texto.replace(/agrega(me)?|añade|crea|nueva tarea/gi,'').replace(/a las \d+.*/i,'').trim();
    if(!nombre) nombre = 'Nueva tarea de almacén';

    return {
      texto: `✅ Listo, aquí está la tarea que quieres agregar. Toca el botón para confirmar:`,
      tareas: [{nombre, hora, prio, cat:'Otro'}]
    };
  }

  if(t.includes('tarea')||t.includes('pendiente')){
    const pends = tareasHoy.filter(t=>!t.done);
    return {texto: pends.length ? `Tienes ${pends.length} tarea(s) pendiente(s): ${pends.map(t=>t.nombre).join(', ')}.` : '✅ ¡Todas las tareas completadas! Excelente.', tareas:[]};
  }
  if(t.includes('recep')){
    const r = recepciones.filter(r=>r.fecha===new Date().toLocaleDateString('es-PE'));
    return {texto: r.length?`Hoy tienes ${r.length} recepción(es): ${r.map(r=>r.nombre).join(', ')}.`:'Sin recepciones hoy.', tareas:[]};
  }
  if(t.includes('reporte')||t.includes('resumen')){
    return {texto:`📊 Hoy: ${hechas}/${tareasHoy.length} tareas completadas (${tareasHoy.length?Math.round(hechas/tareasHoy.length*100):0}%). Ve a Reporte para más detalles.`, tareas:[]};
  }
  return {texto:'🤖 Puedo ayudarte con tareas, recepciones y reportes. También puedes pedirme que agregue tareas. ¿Qué necesitas?', tareas:[]};
}

function chatKeydown(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();enviarMensaje();}
}
function autoResize(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,200)+'px';
}

// ── DASHBOARD ─────────────────────────────────────────────────
function renderDashboard(){
  const hoy = new Date().toISOString().split('T')[0];
  const tareasHoy = tareas.filter(t=>t.fecha===hoy);
  const hechas = tareasHoy.filter(t=>t.done).length;
  const recepHoy = recepciones.filter(r=>r.fecha===new Date().toLocaleDateString('es-PE'));
  document.getElementById('d-tareas').textContent=tareasHoy.length;
  document.getElementById('d-hechas').textContent=hechas;
  document.getElementById('d-recep').textContent=recepHoy.length;
  document.getElementById('d-pend').textContent=tareasHoy.length-hechas;

  const lt=document.getElementById('d-lista-tareas');
  const pends=tareasHoy.filter(t=>!t.done).slice(0,4);
  lt.innerHTML=pends.length?pends.map(t=>`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)"><span>${t.prio==='alta'?'🔴':t.prio==='media'?'🟡':'🟢'}</span><span style="flex:1;font-size:13px">${t.nombre}</span><span style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace">${t.hora}</span></div>`).join(''):'<div style="font-size:13px;color:var(--muted);padding:8px 0">✅ ¡Todas completadas!</div>';

  const lr=document.getElementById('d-lista-recep');
  lr.innerHTML=recepHoy.length?recepHoy.slice(0,3).map(r=>`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)"><span>🚚</span><span style="flex:1;font-size:13px">${r.nombre}</span><span class="status-badge ${r.estado}">${r.estado}</span></div>`).join(''):'<div style="font-size:13px;color:var(--muted);padding:8px 0">Sin recepciones hoy</div>';

  const hora=new Date().getHours();
  const recs=[hora<9?'⏰ Revisa las fechas de vencimiento al inicio del día':null,hora>=9&&hora<12?'📋 Hora pico de recepciones — ten el registro listo':null,hora>=12&&hora<14?'🕐 Actualiza el inventario después del almuerzo':null,hora>=14&&hora<17?'📦 Revisa el orden del almacén esta tarde':null,hora>=17?'📊 Genera el reporte diario antes de salir':null].filter(Boolean);
  document.getElementById('d-recordatorios').innerHTML=recs.map(r=>`<div style="font-size:13px;padding:7px 0;border-bottom:1px solid var(--border)">${r}</div>`).join('');
}

// ── TAREAS ────────────────────────────────────────────────────
function renderTareas(){
  const hoy=new Date().toISOString().split('T')[0];
  const tareasHoy=tareas.filter(t=>t.fecha===hoy).sort((a,b)=>a.hora.localeCompare(b.hora));

  cont.innerHTML=!tareasHoy.length?'<div style="text-align:center;padding:2rem;color:var(--muted)">Sin tareas. Toca + o pídeselas al asistente.</div>':

}
function toggleTarea(id){const t=tareas.find(t=>t.id===id);if(t){t.done=!t.done;guardarTodo();renderTareas();renderDashboard();}}
function eliminarTarea(id){tareas=tareas.filter(t=>t.id!==id);guardarTodo();renderTareas();toast('Tarea eliminada');}
function agregarTarea(){
  const nombre=document.getElementById('t-nombre').value.trim();

  const hoy=new Date().toISOString().split('T')[0];
  tareas.push({id:nextIdT++,nombre,hora,prio,cat,done:false,fecha:hoy});
